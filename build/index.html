<!doctype html>
<html lang="fr-FR" dir="ltr">
  <head>
    <!-- Basics -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Rancho&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="icon" type="image/png" href="img/favicon.png" />

    <!-- For robots & browsers -->
    <meta name="robots" content="index,follow" />
    <meta name="googlebot" content="index,follow" />
    <meta name="google" content="notranslate" />

    <!-- Content -->
    <title>Philippe Marmotte - Générateur d'identité zinzin</title>
    <meta name="author" content="Thomas Pericoi" />
    <meta
      name="description"
      content="Philippe Marmotte est un générateur d'identités loufoques. Abdel Super Zinzin, Gandalf Laser ou encore Didier Tam-Tam. Ils sont tous là !"
    />

    <!-- Open Graph Protocol -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Philippe Marmotte" />
    <meta property="og:url" content="https://philippemarmotte.fr/" />
    <meta property="og:locale" content="fr_FR" />
    <meta
      property="og:description"
      content="Philippe Marmotte est un générateur d'identités loufoques. Abdel Super Zinzin, Gandalf Laser ou encore Didier Tam-Tam. Ils sont tous là !"
    />
    <meta
      property="og:image"
      content="https://philippemarmotte.fr/img/philippeMarmotte.jpg"
    />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Chrome Theme -->
    <meta name="theme-color" content="#f9f9f9" />
  </head>

  <body>
    <noscript>
      <p class="noscript-message">
        Philippe Marmotte nécessite JavaScript pour générer une identité.
      </p>
    </noscript>

    <div class="page">
      <header class="topbar">
        <h1 class="sitename">Philippe Marmotte</h1>
        <button
          id="btn-theme"
          class="btn btn-secondary"
          type="button"
          aria-pressed="false"
        >
          Éteindre
        </button>
      </header>

      <main class="generator" aria-labelledby="generated-identity">
        <p
          id="generated-identity"
          class="generated-identity"
          aria-live="polite"
          aria-atomic="true"
        >
          Philippe Marmotte
        </p>

        <div class="actions">
          <button id="btn-generate" class="btn btn-large" type="button">
            Générer une identité
          </button>
          <button
            id="btn-copy"
            class="btn btn-large btn-secondary"
            type="button"
            aria-label="Copier l'identité générée"
          >
            Copier
          </button>
          <p
            id="copy-status"
            class="sr-only"
            aria-live="polite"
            aria-atomic="true"
          ></p>
        </div>

        <fieldset class="settings">
          <legend class="sr-only">Options de génération</legend>

          <div class="choice">
            <input
              type="radio"
              id="gender-all"
              name="name-gender"
              value="all"
              checked
            />
            <label for="gender-all">Mixte</label>
          </div>

          <div class="choice">
            <input type="radio" id="gender-male" name="name-gender" value="M" />
            <label for="gender-male">Masculin</label>
          </div>

          <div class="choice">
            <input
              type="radio"
              id="gender-female"
              name="name-gender"
              value="F"
            />
            <label for="gender-female">Féminin</label>
          </div>

          <div class="choice">
            <input type="checkbox" id="title" name="title" />
            <label for="title">Utiliser un titre</label>
          </div>
        </fieldset>
      </main>

      <footer class="footer">
        <p id="possibilities" class="possibilities">
          La machine est cassée ...
        </p>

        <div class="credits">
          <span>
            Créé par
            <a
              href="https://thomaspericoi.com/"
              target="_blank"
              rel="noopener noreferrer"
              >Thomas Pericoi</a
            >
          </span>
          <a
            href="https://github.com/ThomasPericoi/PhilippeMarmotte"
            target="_blank"
            rel="noopener noreferrer"
            id="btn-github"
            class="btn btn-secondary"
            aria-label="Voir le dépôt GitHub de Philippe Marmotte"
            >GitHub</a
          >
        </div>
      </footer>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
