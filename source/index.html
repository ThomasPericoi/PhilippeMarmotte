        Philippe Marmotte nécessite JavaScript pour générer une identité.

    <div class="page">
      <header class="topbar">
        <h1 class="sitename">Philippe Marmotte</h1>
        <button
          id="btn-theme"
          class="btn btn-secondary"
          type="button"
          aria-pressed="false"
        >
          Éteindre
        </button>
      </header>

      <main
        class="generator"
        aria-labelledby="generated-identity"
        aria-describedby="possibilities"
      >
        <p
          id="generated-identity"
          class="generated-identity"
          aria-live="polite"
          aria-atomic="true"
        >
          Philippe Marmotte
        </p>

        <div class="generator-controls">
          <div class="generator-actions">
            <button id="btn-generate" class="btn btn-large" type="button">
              Générer une identité
            </button>
            <button
              id="btn-copy"
              class="btn btn-large btn-secondary"
              type="button"
              aria-label="Copier l'identité générée"
            >
              Copier
            </button>
          </div>

          <fieldset class="generator-options">
            <legend class="sr-only">Options de génération</legend>

            <div class="option-choice">
              <input
                type="radio"
                id="gender-all"
                name="name-gender"
                value="all"
                checked
              />
              <label for="gender-all">Mixte</label>
            </div>

            <div class="option-choice">
              <input
                type="radio"
                id="gender-male"
                name="name-gender"
                value="M"
              />
              <label for="gender-male">Masculin</label>
            </div>

            <div class="option-choice">
              <input
                type="radio"
                id="gender-female"
                name="name-gender"
                value="F"
              />
              <label for="gender-female">Féminin</label>
            </div>

            <div class="option-choice">
              <input type="checkbox" id="title" name="title" />
              <label for="title">Utiliser un titre</label>
            </div>
          </fieldset>

          <p
            id="copy-status"
            class="copy-status"
            aria-live="polite"
            aria-atomic="true"
          ></p>
        </div>
      </main>
